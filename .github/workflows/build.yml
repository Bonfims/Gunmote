name: Build Gunmote

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Gunmote.sln

      - name: Build Release x64
        run: msbuild Gunmote.sln /t:Build /p:Configuration=Release /p:Platform=x64 /p:RestorePackages=false /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gunmote-fork-x64
          path: |
            WiiTUIO/bin/Release/
            **/*.exe
            **/*.dll
            !**/*.pdb
