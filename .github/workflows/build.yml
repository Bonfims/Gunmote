name: Build Gunmote

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Gunmote.sln

      - name: Create output directories
        run: |
          mkdir bin\x86\Release
          mkdir bin\x86\Debug
        continue-on-error: true

      - name: Build Release x86
        run: msbuild Gunmote.sln /t:Build /p:Configuration=Release /p:Platform=x86 /p:RestorePackages=false /m

      - name: Prepare artifact
        shell: powershell
        run: |
          $dist = "dist\Gunmote"
          New-Item -ItemType Directory -Force -Path $dist

          # Main executable and managed DLLs from WiiTUIO build
          # Output path is ..\bin\x86\Release\ (relative to project dir) = repo root bin\x86\Release\
          Copy-Item -Recurse -Force bin\x86\Release\* $dist\

          # Native DLLs from source directory (P/Invoke dependencies)
          Copy-Item -Force WiiTUIO\VMultiDll_x64.dll $dist\
          Copy-Item -Force WiiTUIO\VMultiDllWrapper.dll $dist\
          Copy-Item -Force WiiTUIO\VMultiDll_x86.dll $dist\

          # Precompiled managed DLLs from source directory
          Copy-Item -Force WiiTUIO\WiimoteLib.dll $dist\
          Copy-Item -Force WiiTUIO\HIDLibrary.dll $dist\
          Copy-Item -Force WiiTUIO\ScpControl.dll $dist\
          Copy-Item -Force WiiTUIO\Microsoft.Win32.TaskScheduler.dll $dist\
          Copy-Item -Force WiiTUIO\Nefarius.ViGEm.Client.dll $dist\

          # Built native C++ DLL
          Copy-Item -Force WiiCPP\bin\x86\Release\WiiCPP.dll $dist\

          # Built managed DLLs
          Copy-Item -Force HidLibrary\bin\x86\Release\HidLibrary.dll $dist\

          # Keymaps
          if (Test-Path WiiTUIO\Keymaps) {
            Copy-Item -Recurse -Force WiiTUIO\Keymaps $dist\
          }

          # App config
          Copy-Item -Force WiiTUIO\app.config $dist\

          # Resources (custom textures, etc.)
          if (Test-Path WiiTUIO\Resources) {
            Copy-Item -Recurse -Force WiiTUIO\Resources $dist\
          }

          Write-Host "Artifact prepared:"
          Get-ChildItem $dist -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gunmote-fork-x86
          path: dist/Gunmote/
